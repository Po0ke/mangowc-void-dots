background {{
    monitor =
    path = {wallpaper}   # Pywal pulls your current wallpaper
    blur_passes = 3      # High-quality blur
    blur_size = 7
}}

input-field {{
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    outer_color = rgb({color2.rgb})
    inner_color = rgb({background.rgb})
    font_color = rgb({foreground.rgb})
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}}

label {{
    monitor =
    text = $TIME
    color = rgb({foreground.rgb})
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}}
